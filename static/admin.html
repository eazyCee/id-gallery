<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ID Googlers Gallery</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <nav>
        <a href="/gallery" class="logo">ID Googlers Gallery</a>
        <div class="nav-links">
            <a href="/gallery">Gallery</a>
            <a href="/submissions">Submit Photo</a>
            <a href="/admin" class="active">Admin Panel</a>
            <a href="#" onclick="logout()" style="margin-left: 1rem; color: var(--error);">Logout</a>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Photo Administration</h1>

        <div class="status-tabs" id="statusTabs">
            <div class="status-tab active" data-status="ALL">All Submissions</div>
            <div class="status-tab" data-status="DISPLAYED">Now Displayed</div>
            <div class="status-tab" data-status="APPROVED">Approved</div>
            <div class="status-tab" data-status="PENDING">Pending</div>
            <div class="status-tab" data-status="REJECTED">Rejected</div>
        </div>

        <div id="loader" class="loader"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>No submissions available</h2>
            <p>Wait for photographers to submit their work.</p>
        </div>

        <div class="admin-grid" id="adminGrid">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </main>

    <div id="notification" class="notification"></div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchPhotos);

        async function fetchPhotos() {
            try {
                const response = await fetch('/api/admin/photos');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                allPhotos = data.photos; // Store globally
                currentStatus = 'ALL';

                document.getElementById('loader').style.display = 'none';

                if (data.photos.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                renderPhotos();
            } catch (error) {
                console.error("Error fetching photos", error);
                document.getElementById('loader').style.display = 'none';
                showNotification("Failed to load photos", "error");
            }
        }

        let allPhotos = [];
        let currentStatus = 'ALL';

        document.getElementById('statusTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('status-tab')) {
                document.querySelectorAll('.status-tab').forEach(tab => tab.classList.remove('active'));
                e.target.classList.add('active');
                currentStatus = e.target.dataset.status;
                renderPhotos();
            }
        });

        function renderPhotos() {
            const grid = document.getElementById('adminGrid');
            grid.innerHTML = '';

            // 1. Filter by status
            const filteredPhotos = currentStatus === 'ALL'
                ? allPhotos
                : allPhotos.filter(p => p.status === currentStatus);

            if (filteredPhotos.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            } else {
                document.getElementById('emptyState').style.display = 'none';
            }

            // 2. Group by Month/Year
            const groups = {};
            filteredPhotos.forEach(photo => {
                let key = 'Prior Submissions';
                if (photo.createdAt) {
                    const date = new Date(photo.createdAt);
                    key = date.toLocaleString('default', { month: 'long', year: 'numeric' });
                }
                if (!groups[key]) groups[key] = [];
                groups[key].push(photo);
            });

            // 3. Sort groups (newest first)
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                if (a === 'Prior Submissions') return 1;
                if (b === 'Prior Submissions') return -1;
                return new Date(b) - new Date(a);
            });

            // 4. Render
            sortedKeys.forEach(key => {
                const header = document.createElement('div');
                header.className = 'admin-group-header';
                header.innerHTML = `${key} <span>${groups[key].length} photos</span>`;
                grid.appendChild(header);

                groups[key].forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'admin-card';
                    card.innerHTML = `
                        <img src="${photo.imageUrl}" alt="${photo.title}" loading="lazy">
                        <div class="admin-card-content">
                            <div class="admin-card-header">
                                <h3 class="admin-card-title">${photo.title || 'Untitled'}</h3>
                                <span class="status-badge status-${photo.status}">${photo.status}</span>
                            </div>
                            <p class="admin-card-author">by ${photo.photographerName}</p>
                            <p class="admin-card-desc">${photo.description || 'No description provided.'}</p>
                            
                            <div class="admin-actions">
                                <button class="btn btn-small btn-approve" onclick="updateStatus('${photo.id}', 'APPROVED')" ${photo.status === 'APPROVED' ? 'disabled' : ''}>
                                    Approve
                                </button>
                                <button class="btn btn-small btn-reject" onclick="updateStatus('${photo.id}', 'REJECTED')" ${photo.status === 'REJECTED' ? 'disabled' : ''}>
                                    Reject
                                </button>
                                ${['APPROVED', 'DISPLAYED'].includes(photo.status) ? `
                                <button class="btn btn-small btn-display" onclick="setDisplay('${photo.id}')">
                                    ${photo.status === 'DISPLAYED' ? 'Remove from Display' : 'Set as Display'}
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        async function updateStatus(photoId, status) {
            try {
                const formData = new FormData();
                formData.append('status', status);

                const response = await fetch(`/api/admin/photos/${photoId}`, {
                    method: 'PUT',
                    body: formData
                });

                if (response.ok) {
                    showNotification(`Photo ${status.toLowerCase()} successfully`, 'success');
                    fetchPhotos(); // Re-fetch to update UI
                } else {
                    const result = await response.json();
                    showNotification(result.detail || "Update failed", "error");
                }
            } catch (error) {
                console.error("Status update error", error);
                showNotification("Network error occurred", "error");
            }
        }

        async function setDisplay(photoId) {
            try {
                const response = await fetch(`/api/admin/display/${photoId}`, {
                    method: 'PUT'
                });

                if (response.ok) {
                    showNotification(`Photo is now being displayed!`, 'success');
                    fetchPhotos(); // Re-fetch to update UI
                } else {
                    const result = await response.json();
                    showNotification(result.detail || "Display update failed", "error");
                }
            } catch (error) {
                console.error("Display update error", error);
                showNotification("Network error occurred", "error");
            }
        }

        async function logout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error("Logout error", error);
                window.location.href = '/login';
            }
        }

        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification show ${type}`;

            setTimeout(() => {
                notif.className = 'notification';
            }, 3000);
        }
    </script>
</body>

</html>
